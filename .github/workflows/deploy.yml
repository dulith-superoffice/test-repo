name: Deploy MFE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # 1. THIS IS THE CRITICAL PART: 
    # Grant permission to request the OIDC JWT token
    permissions:
      id-token: write 
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build MFE
        run: |
          npm ci
          npm run build
          zip -r dist.zip ./dist

      # 2. Request the OIDC Token from GitHub
      - name: Get GitHub OIDC Token
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            // The audience string typically identifies our target API
            const token = await core.getIDToken('api://test-mfe')
            core.setOutput('token', token)
            
      # 3. Call the SuperOffice Public API
      - name: Publish MFE Version
        run: |
          curl -X POST https://id-dm-test.free.beeceptor.com/api/mfe/publish \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "version=${{ github.sha }}" \
            -F "bundle=@dist.zip"
